<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fit Boys Badminton League</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --fb-blue: #1877f2; --fb-red: #dc3545; --fb-gray: #f0f2f5; --fb-green: #28a745; --fb-gold: #ffd700; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--fb-gray); padding-bottom: 80px; font-size: 14px; overflow-x: hidden; }
        .header { background: var(--fb-blue); color: white; padding: 8px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 1000; font-size: 16px; }
        .container { padding: 4px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 8px; margin-bottom: 4px; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        h3 { margin: 0 0 5px 0; font-size: 13px; border-bottom: 1px solid #eee; padding-bottom: 3px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Compact Last Game Box */
        .last-game-box { background: #fffbe6; border: 1px solid #ffe58f; padding: 5px; border-radius: 6px; margin-bottom: 5px; text-align: center; font-size: 11px; color: #856404; line-height: 1.2; }
        
        input, select, button { padding: 6px; margin: 2px 0; border-radius: 6px; border: 1px solid #ccd0d5; font-size: 14px; box-sizing: border-box; }
        button { background: var(--fb-green); color: white; border: none; font-weight: bold; cursor: pointer; width: 100%; height: 38px; }
        .btn-blue { background: var(--fb-blue); }
        .btn-outline { background: white; color: #666; border: 1px solid #ccc; font-size: 10px; width: auto; padding: 3px 8px; height: 28px; }
        
        /* Slim 3-Column Play Grid */
        .selection-grid { display: grid; grid-template-columns: 1fr 50px 50px; gap: 4px; align-items: center; margin-bottom: 3px; }
        .player-name-cell { background: #fff; padding: 4px 8px; border-radius: 6px; border: 1px solid #eee; font-size: 14px; display: flex; align-items: center; height: 32px; }
        .t-btn { height: 32px; border: 1px solid #ddd; border-radius: 6px; background: #fff; color: #666; font-weight: bold; font-size: 12px; }
        .t1-active .t-btn-1 { background: var(--fb-blue); color: #fff; border-color: var(--fb-blue); }
        .t2-active .t-btn-2 { background: var(--fb-red); color: #fff; border-color: var(--fb-red); }
        .t1-active .player-name-cell { background: #e7f3ff; border-color: var(--fb-blue); }
        .t2-active .player-name-cell { background: #ffeef0; border-color: var(--fb-red); }

        /* Slim Side-by-Side Score */
        .score-row-container { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
        .score-group { flex: 1; text-align: center; }
        .score-label { font-size: 10px; font-weight: bold; display: block; }
        .score-field { height: 44px; font-size: 20px !important; text-align: center; width: 100%; font-weight: bold; }

        .badge, .badge-placeholder { display: inline-block; width: 16px; height: 16px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
        .badge { color: white; font-size: 10px; text-align: center; line-height: 16px; font-weight: bold; }
        .badge-1 { background: var(--fb-gold); color: #000; } .badge-2 { background: #c0c0c0; color: #000; } .badge-3 { background: #cd7f32; }

        .single-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #fff; border-radius: 8px; margin-bottom: 3px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; }
        th, td { padding: 8px 4px; border-bottom: 1px solid #eee; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px 8px; border: none; background: none; font-size: 10px; color: #888; min-width: 55px; text-align: center; }
        .tab-btn.active { color: var(--fb-blue); border-top: 2px solid var(--fb-blue); font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="header">🏸 Fit Boys Pro</div>

<div class="container">
    <div id="tab-play" class="tab-content active">
        <div id="lastGameAlert" class="last-game-box" style="display:none;"></div>
        <div class="card">
            <h3>Match Maker <button class="btn-outline" onclick="suggestTeams()">Auto</button></h3>
            <div id="selectionListContainer"></div>
            
            <div class="score-row-container">
                <div class="score-group">
                    <span class="score-label" style="color:var(--fb-blue)">T1</span>
                    <input type="number" id="s1" class="score-field" placeholder="0" inputmode="numeric">
                </div>
                <div style="padding-top:15px; font-weight:bold; font-size:10px;">VS</div>
                <div class="score-group">
                    <span class="score-label" style="color:var(--fb-red)">T2</span>
                    <input type="number" id="s2" class="score-field" placeholder="0" inputmode="numeric">
                </div>
            </div>
            
            <button class="btn-blue" style="margin-top:8px; height:44px; font-size:15px;" onclick="recordMatch()">Submit Result</button>
        </div>
    </div>

    <div id="tab-roster" class="tab-content">
        <div class="card"><h3>Roster</h3><div id="rosterList"></div></div>
    </div>
    <div id="tab-rank" class="tab-content">
        <div class="card"><h3>🏆 Rank <select id="rankEventFilter" onchange="updateUI()"></select></h3>
        <table><thead><tr><th>#</th><th>Name</th><th>G</th><th>Pts</th><th>PPG</th></tr></thead><tbody id="leaderboardBody"></tbody></table></div>
    </div>
    <div id="tab-pairs" class="tab-content">
        <div class="card"><h3>👥 Pairs</h3><table><thead><tr><th>#</th><th>Pair</th><th>G</th><th>W-L</th><th>%</th></tr></thead><tbody id="pairsBody"></tbody></table></div>
    </div>
    <div id="tab-hist" class="tab-content">
        <div class="card"><h3>🕒 History <div><button class="btn-outline" onclick="clearTournamentRecords()">Clear</button><button class="btn-outline" onclick="window.print()">Print</button></div></h3><div id="historyList"></div></div>
    </div>
    <div id="tab-admin" class="tab-content">
        <div class="card"><h3>Add Player</h3><div style="display:flex; gap:5px;"><input type="text" id="newName" placeholder="Name" style="flex:2;"><input type="number" id="newSkill" value="5" style="flex:1;"><button class="btn-blue" onclick="addPlayer()">Add</button></div></div>
        <div class="card"><h3>Rules</h3><div style="display:grid; grid-template-columns: 1fr 60px; gap:5px; font-size:12px;"><label>Win Bonus:</label><input type="number" id="winBonus"><label>Margin:</label><input type="number" step="0.1" id="marginMult"><label>Min:</label><input type="number" id="minGames"></div><button onclick="updateSettings()" style="margin-top:5px; height:36px;">Save</button></div>
    </div>
</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('play', this)">🎮 Play</button>
    <button class="tab-btn" onclick="switchTab('roster', this)">📍 Roster</button>
    <button class="tab-btn" onclick="switchTab('rank', this)">🏆 Rank</button>
    <button class="tab-btn" onclick="switchTab('pairs', this)">👥 Pairs</button>
    <button class="tab-btn" onclick="switchTab('hist', this)">🕒 Hist</button>
    <button class="tab-btn" onclick="switchTab('admin', this)">⚙️ Admin</button>
</div>

<script>
    const ADMIN_PWD = "suji"; const SUPER_PWD = "P@ssword";
    const firebaseConfig = {
      apiKey: "AIzaSyCn2ZdRrvfFWFJFiRbPmJi2galq768OPH4",
      authDomain: "badmintontracker-d565c.firebaseapp.com",
      projectId: "badmintontracker-d565c",
      storageBucket: "badmintontracker-d565c.firebasestorage.app",
      messagingSenderId: "592621421914",
      appId: "1:592621421914:web:5f0e2a4ff2b56c056f5f63"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const cloudDoc = db.collection('badmintonTracker').doc('FitBoys_Permanent_Data');

    let players = []; let history = []; let events = [{id:'def', name:'Season 1', active:true}];
    let config = { winBonus: 3, marginMult: 1, minGames: 3 }; let selections = {};

    cloudDoc.onSnapshot(doc => {
        if(doc.exists) {
            const d = doc.data(); players = d.players || []; history = d.history || []; events = d.events || events;
            if(d.config) { config = d.config; document.getElementById('winBonus').value = config.winBonus; document.getElementById('marginMult').value = config.marginMult; document.getElementById('minGames').value = config.minGames; }
            updateUI();
        }
    });

    function save() { cloudDoc.set({ players, history, events, config }); }
    function auth(pwd) { const e = prompt("Password:"); return e === pwd; }

    function updateUI() {
        const ef = document.getElementById('rankEventFilter');
        const cur = ef.value; ef.innerHTML = '<option value="all">Lifetime</option>';
        events.forEach(e => ef.innerHTML += `<option value="${e.id}" ${cur==e.id?'selected':''}>${e.name}</option>`);

        let st = {}; players.forEach(p => st[p.name] = {g:0, pts:0});
        history.forEach(m => {
            const diff = Math.abs(m.s1 - m.s2);
            [...m.t1, ...m.t2].forEach(n => {
                if(!st[n]) return; st[n].g++;
                const isT1 = m.t1.includes(n); const won = (isT1 && m.s1 > m.s2) || (!isT1 && m.s2 > m.s1);
                if(won) { st[n].pts += config.winBonus + (diff * config.marginMult); }
            });
        });
        const sorted = Object.keys(st).map(n => ({name:n, ...st[n]})).sort((a,b) => (b.pts/(b.g||1)) - (a.pts/(a.g||1)));
        const top3Names = sorted.filter(x => x.pts > 0).slice(0,3).map(x => x.name);

        const alertBox = document.getElementById('lastGameAlert');
        if(history.length > 0) {
            const m = history[history.length - 1]; const w1 = m.s1 >= m.s2; alertBox.style.display = 'block';
            alertBox.innerHTML = `🏁 <b>Last:</b> ${w1 ? m.s1 : m.s2}-${w1 ? m.s2 : m.s1} (${w1 ? m.t1.join("/") : m.t2.join("/")} beat ${w1 ? m.t2.join("/") : m.t1.join("/")})`;
        }

        document.getElementById('selectionListContainer').innerHTML = players.filter(p => p.present).sort((a, b) => sorted.findIndex(x => x.name === a.name) - sorted.findIndex(x => x.name === b.name)).map(p => {
            const r = top3Names.indexOf(p.name) + 1; const bHtml = r > 0 ? `<span class="badge badge-${r}">${r}</span>` : `<span class="badge-placeholder"></span>`;
            const t = selections[p.name];
            return `<div class="selection-grid ${t==1?'t1-active':t==2?'t2-active':''}">
                <div class="player-name-cell">${bHtml} <b>${p.name}</b> <span style="font-size:10px; color:#999; margin-left:auto;">S${p.skill}</span></div>
                <button class="t-btn t-btn-1" onclick="selectTeam('${p.name}', 1)">T1</button>
                <button class="t-btn t-btn-2" onclick="selectTeam('${p.name}', 2)">T2</button>
            </div>`;
        }).join('');

        document.getElementById('rosterList').innerHTML = players.sort((a,b)=>a.name.localeCompare(b.name)).map(p => `<div class="single-row"><div style="display:flex; align-items:center; gap:8px;"><input type="checkbox" ${p.present?'checked':''} onchange="togglePresence('${p.name}')" style="width:20px; height:20px;"> <b>${p.name}</b></div><div style="display:flex; align-items:center; gap:5px;"><input type="number" value="${p.skill}" onchange="updateSkill('${p.name}', this.value)" style="width:40px; margin:0; height:30px;"><button class="btn-outline" style="color:red; border-color:red;" onclick="deletePlayer('${p.name}')">🗑️</button></div></div>`).join('');
        document.getElementById('leaderboardBody').innerHTML = sorted.map((p,i) => `<tr><td>${i+1}</td><td style="text-align:left"><b>${p.name}</b></td><td>${p.g}</td><td>${p.pts.toFixed(1)}</td><td><b>${(p.pts/(p.g||1)).toFixed(1)}</b></td></tr>`).join('');
        const filterId = document.getElementById('rankEventFilter').value || 'all';
        const fHist = filterId === 'all' ? history : history.filter(m => m.eventId === filterId);
        document.getElementById('historyList').innerHTML = [...fHist].reverse().map(m => {
            const w1 = m.s1 >= m.s2; const d = m.time ? new Date(m.time).toLocaleString([], {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'}) : '';
            return `<div class="single-row"><div style="flex-grow:1"><b>${w1?m.s1:m.s2}</b>-${w1?m.s2:m.s1} (${w1?m.t1.join("/"):m.t2.join("/")})<br><small>${d}</small></div><div style="display:flex; gap:3px;"><button class="btn-outline" onclick="editMatch(${m.id})">Edit</button><button class="btn-outline" style="color:red" onclick="deleteMatch(${m.id})">X</button></div></div>`;
        }).join('');
    }

    function switchTab(id, btn) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('tab-'+id).classList.add('active'); btn.classList.add('active'); }
    function addPlayer() { const n = document.getElementById('newName'); const s = document.getElementById('newSkill'); if(n.value.trim()){ players.push({ name: n.value.trim(), skill: parseInt(s.value), present: false, lastPlayed: 0 }); n.value=''; s.value='5'; save(); }}
    function selectTeam(name, team) { if(selections[name] === team) delete selections[name]; else { if(Object.values(selections).filter(v => v === team).length >= 2) return; selections[name] = team; } updateUI(); }
    function recordMatch() { 
        const ev = events.find(e => e.active); const t1 = Object.keys(selections).filter(n => selections[n] === 1); const t2 = Object.keys(selections).filter(n => selections[n] === 2); 
        const s1 = parseInt(document.getElementById('s1').value); const s2 = parseInt(document.getElementById('s2').value); 
        if(!t1.length || isNaN(s1)) return alert("Data missing!"); 
        const now = Date.now(); history.push({ t1, t2, s1, s2, eventId: ev?ev.id:'def', time: now, id: now }); 
        [...t1, ...t2].forEach(n => { const p = players.find(x => x.name === n); if(p) p.lastPlayed = now; });
        selections = {}; document.getElementById('s1').value=''; document.getElementById('s2').value=''; save(); 
    }
    function clearTournamentRecords() { if(auth(SUPER_PWD)) { history = history.filter(m => m.eventId !== events.find(e => e.active)?.id); players.forEach(p => p.lastPlayed = 0); save(); alert("Reset Done!"); } }
    function editMatch(id) { if(!auth(SUPER_PWD)) return; let m = history.find(x => x.id === id); let ns1 = prompt("T1 Score:", m.s1); let ns2 = prompt("T2 Score:", m.s2); if(ns1 !== null) { m.s1 = parseInt(ns1); m.s2 = parseInt(ns2); save(); } }
    function deleteMatch(id) { if(auth(SUPER_PWD)) { history = history.filter(m => m.id !== id); save(); } }
    function deletePlayer(name) { if(auth(SUPER_PWD)) { players = players.filter(p => p.name !== name); save(); } }
    function updateSkill(name, val) { const p = players.find(x => x.name === name); if(p) { p.skill = parseInt(val); save(); } }
    function togglePresence(name) { const p = players.find(x => x.name === name); if(p) { p.present = !p.present; save(); } }
    function updateSettings() { if(!auth(ADMIN_PWD)) return; config.winBonus = parseFloat(document.getElementById('winBonus').value); config.marginMult = parseFloat(document.getElementById('marginMult').value); config.minGames = parseInt(document.getElementById('minGames').value); save(); }
    function suggestTeams() { const pool = players.filter(p => p.present).sort((a,b) => a.lastPlayed - b.lastPlayed).slice(0,4); pool.sort((a,b) => a.skill - b.skill); selections = {}; selections[pool[0].name] = 1; selections[pool[3].name] = 1; selections[pool[1].name] = 2; selections[pool[2].name] = 2; updateUI(); }
</script>
</body>
</html>
